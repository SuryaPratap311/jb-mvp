version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: getdeveloper-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - getdeveloper-net

  # n8n runs separately via docker run (simpler for MVP)
  # If you want it in compose, uncomment below:
  # n8n:
  #   image: n8nio/n8n:latest
  #   container_name: getdeveloper-n8n
  #   ports:
  #     - "5678:5678"
  #   volumes:
  #     - n8n_data:/home/node/.n8n
  #   networks:
  #     - getdeveloper-net

networks:
  getdeveloper-net:
    driver: bridge

volumes:
  n8n_data: